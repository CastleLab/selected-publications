# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run.
on:
  # Manual only: disable automatic commits that overwrite public/bundle.json.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
      - name: Bundle JSON asset
        run: npm run build
      
      - name: Create pull request for bundle updates
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bundle JSON asset"
          branch: "chore/bundle-json-updates"
          delete-branch: true
          title: "chore: bundle JSON asset"
          body: |
            This PR is automatically generated by the CI workflow.

            Changes include:
            - refreshed public/bundle.json
          labels: |
            automation
            publications
          
      
      
      
